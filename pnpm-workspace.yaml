packages:
  - "frontend"
  - "backend"
  - "packages/*"

# Trusted dependency build scripts. Native/postinstall builds required by these
# packages are allowed; @scarf telemetry is intentionally disabled.
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  '@scarf/scarf': false
  '@swc/core': true
  argon2: true
  esbuild: true
  prisma: true
